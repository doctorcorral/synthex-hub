services:
  synthex-worker:
    build: .
    image: doctorcorral/synthex-worker:latest
    restart: unless-stopped
    environment:
      # Point at your hub. For the local-dev hub, use:
      #   http://host.docker.internal:4000/api  (Docker Desktop / Mac)
      # For the public hub at synthex.fit:
      #   https://synthex.fit/api
      SERVER_URL: ${SERVER_URL:-https://synthex.fit/api}
      # Optional — workers are anonymous by default. Only set if your
      # hub explicitly requires worker auth.
      API_TOKEN:  ${API_TOKEN:-}
      POOL_SIZE:  ${POOL_SIZE:-}
      # Display name on the public leaderboard. Defaults to "anonymous"
      # (all anonymous workers aggregate into one leaderboard row).
      # Set to a handle (e.g. "alice@laptop") to opt in to recognition.
      WORKER_NAME: ${WORKER_NAME:-anonymous}
      # WORKER_ID is auto-generated by the entrypoint on first start
      # and persisted to /var/synthex/worker_id below; setting it here
      # is only useful for tests or explicit identity migration.
    volumes:
      # Persists the stable worker_id (UUID) across container removal,
      # image rebuilds, and `docker compose down -v` is the only way
      # to forget the identity entirely.
      - synthex-worker-data:/var/synthex
    # Limit CPU usage to leave a few cores free for the host:
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '6'

volumes:
  synthex-worker-data:
